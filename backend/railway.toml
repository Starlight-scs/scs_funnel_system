  [build]
  builder = "NIXPACKS"

  [deploy]
  runtime = "V2"
  numReplicas = 1
  preDeployCommand = "python manage.py migrate"
  startCommand = "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py createsuperuser --noinput || true && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
  sleepApplication = false
  useLegacyStacker = false
  ipv6EgressEnabled = false
  multiRegionConfig = { us-west2 = { numReplicas = 1 } }
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10
